# cargo-deny configuration for Photon.
# See docs/supply-chain.md for Git dependency policy.

[advisories]
version = 2
yanked = "warn"
# rustls-webpki 0.102.8 is required by async-nats 0.38; patched line is 0.103.x only.
# Track bumping async-nats (≥0.49) before removing the webpki ignores.
# Unmaintained crates are transitive via broker SDKs (no safe upgrade).
ignore = [
    { id = "RUSTSEC-2024-0384", reason = "unmaintained instant; transitive via broker SDKs" },
    { id = "RUSTSEC-2024-0436", reason = "unmaintained paste; transitive via broker SDKs" },
    { id = "RUSTSEC-2025-0134", reason = "unmaintained rustls-pemfile; transitive via broker SDKs" },
    { id = "RUSTSEC-2026-0049", reason = "transitive via async-nats 0.38 → rustls-webpki 0.102.8" },
    { id = "RUSTSEC-2026-0098", reason = "transitive via async-nats 0.38 → rustls-webpki 0.102.8" },
    { id = "RUSTSEC-2026-0099", reason = "transitive via async-nats 0.38 → rustls-webpki 0.102.8" },
    { id = "RUSTSEC-2026-0104", reason = "transitive via async-nats 0.38 → rustls-webpki 0.102.8" },
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "OpenSSL",
    "CC0-1.0",
    "MPL-2.0",
    "0BSD",
    "BSL-1.0",
    "Unlicense",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-git = []
