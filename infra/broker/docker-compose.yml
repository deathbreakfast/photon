services:
  nats-1:
    profiles: [cluster]
    image: nats:2.10
    container_name: photon-nats-1
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - ./config/nats-1.conf:/etc/nats/nats.conf:ro
      - nats-1-data:/data
    command: ["-c", "/etc/nats/nats.conf"]

  nats-2:
    profiles: [cluster]
    image: nats:2.10
    container_name: photon-nats-2
    ports:
      - "4225:4222"
      - "8225:8222"
    volumes:
      - ./config/nats-2.conf:/etc/nats/nats.conf:ro
      - nats-2-data:/data
    command: ["-c", "/etc/nats/nats.conf"]

  nats-3:
    profiles: [cluster]
    image: nats:2.10
    container_name: photon-nats-3
    ports:
      - "4224:4222"
      - "8224:8222"
    volumes:
      - ./config/nats-3.conf:/etc/nats/nats.conf:ro
      - nats-3-data:/data
    command: ["-c", "/etc/nats/nats.conf"]

  nats-single:
    profiles: [single]
    image: nats:2.10
    container_name: photon-nats-1
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - ./config/nats-single.conf:/etc/nats/nats.conf:ro
      - nats-single-data:/data
    command: ["-c", "/etc/nats/nats.conf"]

  kafka-single:
    profiles: [kafka]
    image: apache/kafka:3.8.1
    container_name: photon-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://127.0.0.1:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@127.0.0.1:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1

volumes:
  nats-1-data:
  nats-2-data:
  nats-3-data:
  nats-single-data:
