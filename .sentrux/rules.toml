# Photon quality gates (benchmark harness work).
# Run Sentrux scan + check_rules before merging large bench PRs.

[project]
name = "photon"

[constraints]
max_cycles = 0
max_cc = 25
# Facade re-exports live in photon/src/runtime/mod.rs (not lib.rs).
no_god_files = true

[thresholds]
max_coupling_score = 8.0
max_cross_module_edges = 80

[[boundaries]]
from = "photon-bench/src/metrics/**"
to = "photon-bench/src/experiments/**"
reason = "Metrics must not depend on experiment runners"

[[boundaries]]
from = "photon-bench/src/report/**"
to = "photon-testkit/**"
reason = "Report schema stays bench-scoped"

[revisit]
trigger = "Tighten thresholds after photon-bench matrix campaigns stabilize."
note = "Target <=400 LOC per .rs file; hard stop at 450."
